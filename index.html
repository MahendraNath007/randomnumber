<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Basic Website</title>
    <style>
        /* Global Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
        }

        h1, h2 {
            margin: 0;
            padding: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Navigation Bar */
        nav {
            background-color: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            font-size: 24px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            font-size: 16px;
            text-transform: uppercase;
        }

        nav ul li a:hover {
            color: #f39c12;
        }

        /* Main Content Section */
        .main-section {
            padding: 50px;
            text-align: center;
            background-color: #e74c3c;
            color: white;
        }

        .main-section h2 {
            font-size: 36px;
        }

        .main-section p {
            font-size: 18px;
            margin-top: 20px;
        }

        /* Footer */
        footer {
            background-color: #333;
            text-align: center;
            padding: 20px;
            color: white;
        }

        footer p {
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <h1>Basic Website</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content Section -->
    <section class="main-section">
        <h2>Welcome to Our Website!</h2>
        <p>This is a simple website built using HTML, CSS, and JavaScript. You can add more content here as needed.</p>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Basic Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
